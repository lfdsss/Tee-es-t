# Root configuration — applies to Python code outside of nested packages
# (commercial-agent/, snb-agent/, scripts, etc.)
#
# Nested packages with their own pyproject.toml (studentflow/) keep their
# own — Ruff resolves the closest config per file.

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
    "node_modules",
    ".venv",
    "venv",
    "build",
    "dist",
    "*.egg-info",
]

[tool.ruff.lint]
# E   = pycodestyle errors
# F   = pyflakes (unused imports, undefined names)
# BLE = flake8-blind-except (catches `except:` and `except Exception:` that
#       silently swallow errors — the #1 source of invisible bugs in agents)
# RUF100 = unused `# noqa` directives
select = ["E", "F", "BLE", "RUF100"]

[tool.ruff.lint.per-file-ignores]
# Scrapers, agent loops and tool routers: blind except is INTENTIONAL —
# one failing source (network, parser, 3rd-party API change) must never
# crash the whole agent. Pattern documented in studentflow/CLAUDE.md.
"snb-agent/scrapers/*.py" = ["BLE001"]
"snb-agent/api.py" = ["BLE001", "E501"]
"snb-agent/main.py" = ["BLE001", "E501"]
"snb-agent/notifier.py" = ["BLE001"]
"snb-agent/email_sender.py" = ["BLE001"]
"snb-agent/db.py" = ["BLE001"]
"snb-agent/proposer.py" = ["BLE001", "E501"]
"snb-agent/document_generator.py" = ["E501"]
"commercial-agent/update_status.py" = ["BLE001"]
"commercial-agent/document_generator.py" = ["E501"]
# Tool routers wrap external APIs (Hubspot, Notion, GitHub, Gmail) — long
# URL templates, big payload strings and broad except by design.
"commercial-agent/tools/*.py" = ["BLE001", "E501"]
"commercial-agent/config/*.py" = ["E501"]
"dossier-ami/scripts/*.py" = ["E501"]
